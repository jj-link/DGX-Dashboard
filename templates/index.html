<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1a1a26;
    --border: #2a2a3a;
    --text: #e0e0e8;
    --text-dim: #8888a0;
    --green: #00e676;
    --yellow: #ffca28;
    --red: #ff5252;
    --blue: #448aff;
    --purple: #b388ff;
    --cyan: #18ffff;
    --orange: #ff9100;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'JetBrains Mono', 'Fira Code', 'SF Mono', 'Consolas', monospace;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── Header ─────────────────────────────────────────────── */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    font-size: 20px;
    font-weight: 700;
    color: var(--cyan);
    letter-spacing: -0.5px;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 24px;
    font-size: 12px;
    color: var(--text-dim);
  }

  .header-stat {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .header-stat .label { color: var(--text-dim); }
  .header-stat .value { color: var(--text); }

  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--green);
    display: inline-block;
    animation: pulse 2s ease-in-out infinite;
  }

  .status-dot.error { background: var(--red); }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* ── Main layout ────────────────────────────────────────── */
  .container {
    max-width: 1600px;
    margin: 0 auto;
    padding: 24px 32px;
  }

  .section-title {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--text-dim);
    margin-bottom: 12px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
  }

  .section { margin-bottom: 24px; }

  /* ── System bar ─────────────────────────────────────────── */
  .system-bar {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 20px;
    display: flex;
    align-items: center;
    gap: 24px;
  }

  .sys-item {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .sys-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
  }

  .sys-info { display: flex; flex-direction: column; }

  .sys-label {
    font-size: 9px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .sys-value {
    font-size: 13px;
    font-weight: 600;
  }

  .sys-bar-wrap {
    width: 80px;
    height: 3px;
    background: var(--surface2);
    border-radius: 2px;
    overflow: hidden;
    margin-top: 2px;
  }

  .sys-bar-fill {
    height: 100%;
    border-radius: 2px;
  }

  /* ── GPU Grid ───────────────────────────────────────────── */
  .gpu-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
    gap: 16px;
    align-items: stretch;
  }

  .gpu-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    transition: border-color 0.3s;
    display: flex;
    flex-direction: column;
  }

  .gpu-card:hover { border-color: var(--cyan); }

  .gpu-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }

  .gpu-name {
    font-size: 14px;
    font-weight: 600;
    color: var(--cyan);
  }

  .gpu-index {
    font-size: 10px;
    color: var(--text-dim);
    background: var(--surface2);
    padding: 2px 8px;
    border-radius: 3px;
  }

  .gpu-body {
    display: grid;
    grid-template-columns: 100px 1fr;
    gap: 16px;
    align-items: center;
  }

  /* Circular gauge */
  .gauge {
    width: 100px;
    height: 100px;
    position: relative;
  }

  .gauge svg {
    transform: rotate(-90deg);
    width: 100%;
    height: 100%;
  }

  .gauge-bg {
    fill: none;
    stroke: var(--surface2);
    stroke-width: 6;
  }

  .gauge-fill {
    fill: none;
    stroke-width: 6;
    stroke-linecap: round;
    transition: stroke-dashoffset 0.5s ease;
  }

  .gauge-center {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
  }

  .gauge-value {
    font-size: 20px;
    font-weight: 700;
  }

  .gauge-label {
    font-size: 9px;
    color: var(--text-dim);
    text-transform: uppercase;
  }

  /* GPU metrics */
  .gpu-metrics {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .metric-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }

  .metric-label {
    font-size: 10px;
    color: var(--text-dim);
    min-width: 60px;
  }

  .metric-bar-container {
    flex: 1;
    height: 4px;
    background: var(--surface2);
    border-radius: 2px;
    overflow: hidden;
  }

  .metric-bar {
    height: 100%;
    border-radius: 2px;
    transition: width 0.5s ease;
  }

  .metric-value {
    font-size: 11px;
    font-weight: 600;
    min-width: 80px;
    text-align: right;
  }

  /* ── Server Grid ────────────────────────────────────────── */
  .server-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
    gap: 16px;
  }

  .server-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    transition: border-color 0.3s;
    display: flex;
    flex-direction: column;
  }

  .server-card:hover { border-color: var(--purple); }
  .server-card.offline { opacity: 0.5; }

  .server-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }

  .server-name {
    font-size: 14px;
    font-weight: 600;
    color: var(--purple);
  }

  .server-type {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-dim);
    background: var(--surface2);
    padding: 2px 8px;
    border-radius: 4px;
  }

  .server-model {
    font-size: 12px;
    color: var(--text);
    margin-bottom: 12px;
    padding: 8px 12px;
    background: var(--surface2);
    border-radius: 6px;
    word-break: break-all;
  }

  .server-stats {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
  }

  .sparkline {
    display: flex;
    align-items: flex-end;
    gap: 2px;
    height: 16px;
    margin-top: 4px;
    width: 100%;
  }
  .sparkline-bar {
    flex: 1;
    background: var(--green);
    border-radius: 1px;
    min-height: 1px;
    transition: height 0.3s ease;
  }

  .server-stat {
    flex: 1 1 calc(33.333% - 12px);
    min-width: 110px;
    text-align: center;
    padding: 10px;
    background: var(--surface2);
    border-radius: 8px;
  }

  .server-stat-value {
    font-size: 18px;
    font-weight: 700;
    line-height: 1.2;
  }

  .server-stat-label {
    font-size: 9px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-top: 2px;
  }

  .server-error {
    background: var(--surface2);
    border: 1px solid var(--red);
    border-radius: 8px;
    padding: 16px;
    text-align: center;
    color: var(--red);
    font-size: 13px;
  }

  .no-servers {
    text-align: center;
    color: var(--text-dim);
    padding: 40px;
    font-size: 13px;
  }

  .no-servers code {
    background: var(--surface2);
    padding: 2px 6px;
    border-radius: 3px;
    font-size: 12px;
  }

  /* ── Host Group ──────────────────────────────────────────── */
  #host-groups {
    display: flex;
    flex-direction: column;
    gap: 24px;
  }

  .section-row {
    display: flex;
    gap: 24px;
    align-items: stretch;
  }

  .section-col {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
  }

  .section-col .gpu-grid {
    flex: 1;
    grid-auto-rows: 1fr;
  }

  .host-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 12px;
    padding-bottom: 8px;
    border-bottom: 2px solid var(--border);
  }

  .host-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 6px var(--green);
  }

  .host-name {
    font-size: 14px;
    font-weight: 700;
    color: var(--cyan);
    letter-spacing: 1px;
  }

  .host-subtitle {
    font-size: 10px;
    color: var(--text-dim);
    margin-left: 4px;
  }

  /* ── Update flash ───────────────────────────────────────── */
  .flash {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: var(--cyan);
    opacity: 0;
    z-index: 200;
    pointer-events: none;
  }

  .flash.active {
    animation: flash 0.5s ease-out;
  }

  @keyframes flash {
    0% { opacity: 0.8; }
    100% { opacity: 0; }
  }

  /* ── Tab system ─────────────────────────────────────────── */
  .tab-bar {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 0 8px;
  }

  .tab-btn {
    font-family: inherit;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-dim);
    background: none;
    border: none;
    padding: 6px 16px;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: color 0.2s, border-color 0.2s;
  }

  .tab-btn:hover { color: var(--text); }
  .tab-btn.active { color: var(--cyan); border-bottom-color: var(--cyan); }

  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* ── Benchmark sub-tabs ──────────────────────────────────── */
  .sub-tabs {
    display: flex;
    gap: 2px;
    margin-bottom: 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 4px;
  }

  .sub-tab-btn {
    font-family: inherit;
    font-size: 11px;
    color: var(--text-dim);
    background: none;
    border: 1px solid transparent;
    padding: 6px 14px;
    cursor: pointer;
    border-radius: 4px;
    transition: color 0.2s, background 0.2s;
  }
  .sub-tab-btn:hover { color: var(--text); background: var(--surface2); }
  .sub-tab-btn.active { color: var(--green); background: var(--surface2); border-color: var(--green); }

  .sub-tab-panel { display: none; }
  .sub-tab-panel.active { display: block; }

  /* ── Data tables ─────────────────────────────────────────── */
  .data-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 14px;
  }
  .data-table th {
    text-align: left;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-dim);
    padding: 8px 12px;
    border-bottom: 1px solid var(--border);
    background: var(--surface2);
    position: sticky;
    top: 0;
  }
  .data-table td {
    padding: 8px 12px;
    border-bottom: 1px solid var(--border);
    color: var(--text);
    vertical-align: middle;
  }
  .data-table tr:hover td { background: var(--surface2); }
  .data-table td.num {
    text-align: right;
    font-variant-numeric: tabular-nums;
  }
  .data-table .bar-cell {
    width: 120px;
  }
  .table-bar-wrap {
    width: 100%;
    height: 6px;
    background: var(--surface2);
    border-radius: 3px;
    overflow: hidden;
  }
  .table-bar {
    height: 100%;
    border-radius: 3px;
    transition: width 0.3s ease;
  }

  /* Heatmap cell */
  .hm-cell {
    text-align: center;
    padding: 8px 10px;
    border-radius: 3px;
    font-weight: 600;
    font-size: 13.5px;
  }

  .bm-empty {
    text-align: center;
    color: var(--text-dim);
    padding: 40px;
    font-size: 13px;
  }

  /* ── Responsive ─────────────────────────────────────────── */
  @media (max-width: 768px) {
    .container { padding: 16px; }
    .gpu-grid { grid-template-columns: 1fr; }
    .server-grid { grid-template-columns: 1fr; }
    .system-bar { flex-direction: column; gap: 16px; }
    .header { padding: 12px 16px; }
    .header-right { display: none; }
    .section-row { flex-direction: column; }
  }
</style>
</head>
<body>

<div class="flash" id="flash"></div>

<header class="header">
  <div class="header-left">
    <div class="logo">INFRA DASHBOARD</div>
  </div>
  <div class="header-right">
    <div class="header-stat">
      <span class="status-dot" id="status-dot"></span>
      <span class="label">Status</span>
      <span class="value" id="status-text">Live</span>
    </div>
    <div class="header-stat">
      <span class="label">Updated</span>
      <span class="value" id="last-update">--:--:--</span>
    </div>
    <div class="header-stat">
      <span class="label">Refresh</span>
      <span class="value">{{ refresh_interval }}s</span>
    </div>
  </div>
  <div class="tab-bar">
    <button class="tab-btn active" data-tab="live">Live Stats</button>
    <button class="tab-btn" data-tab="benchmarks">Benchmarks</button>
  </div>
</header>

<div class="container">
  <div class="tab-panel active" id="tab-live">

  <!-- System bar -->
  <div class="section">
    <div class="system-bar" id="system-bar">
      <div class="sys-item">
        <div class="sys-dot" style="background:var(--green)"></div>
        <div class="sys-info">
          <div class="sys-label">Hostname</div>
          <div class="sys-value" id="sys-hostname">--</div>
        </div>
      </div>
      <div class="sys-item">
        <div class="sys-dot" style="background:var(--blue)"></div>
        <div class="sys-info">
          <div class="sys-label">Uptime</div>
          <div class="sys-value" id="sys-uptime">--</div>
        </div>
      </div>
      <div class="sys-item">
        <div class="sys-dot" style="background:var(--cyan)"></div>
        <div class="sys-info">
          <div class="sys-label">Memory</div>
          <div class="sys-value" id="sys-mem">--</div>
          <div class="sys-bar-wrap">
            <div class="sys-bar-fill" id="sys-mem-bar" style="width:0%; background:var(--blue)"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Host groups (GPUs + servers grouped by host) -->
  <div id="host-groups">
    <!-- Rendered dynamically by JS -->
  </div>

  </div>

  <!-- BENCHMARKS TAB -->
  <div class="tab-panel" id="tab-benchmarks">
    <div class="sub-tabs" id="bm-subtabs">
      <button class="sub-tab-btn active" data-subtab="oneshot">Oneshot</button>
      <button class="sub-tab-btn" data-subtab="multiturn">Multi-turn</button>
      <button class="sub-tab-btn" data-subtab="heatmap">Language Heatmap</button>
      <button class="sub-tab-btn" data-subtab="quantization">Quantization Impact</button>
      <button class="sub-tab-btn" data-subtab="tokencost">Token Cost</button>
    </div>
    <div class="sub-tab-panel active" id="subtab-oneshot"><div class="bm-empty">Loading...</div></div>
    <div class="sub-tab-panel" id="subtab-multiturn"><div class="bm-empty">Loading...</div></div>
    <div class="sub-tab-panel" id="subtab-heatmap"><div class="bm-empty">Loading...</div></div>
    <div class="sub-tab-panel" id="subtab-quantization"><div class="bm-empty">Loading...</div></div>
    <div class="sub-tab-panel" id="subtab-tokencost"><div class="bm-empty">Loading...</div></div>
  </div>

</div>

<script>
// ── Utilities ────────────────────────────────────────────────────────────────

function fmtBytes(bytes) {
  if (bytes == null || bytes === 0) return 'N/A';
  const units = ['B', 'KB', 'MB', 'GB', 'TB'];
  let i = 0;
  let v = bytes;
  while (v >= 1024 && i < units.length - 1) { v /= 1024; i++; }
  return v.toFixed(1) + ' ' + units[i];
}

function fmtNum(n, decimals = 0) {
  if (n == null) return 'N/A';
  return Number(n).toLocaleString('en-US', { minimumFractionDigits: decimals, maximumFractionDigits: decimals });
}

function he(s) {
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function gaugeColor(pct) {
  if (pct == null) return '#888';
  if (pct < 50) return '#00e676';
  if (pct < 80) return '#ffca28';
  return '#ff5252';
}

function tempColor(t) {
  if (t == null) return '#888';
  if (t < 60) return '#00e676';
  if (t < 75) return '#ffca28';
  return '#ff5252';
}

function svgGauge(pct, color) {
  const r = 48, circ = 2 * Math.PI * r;
  const offset = circ - (pct / 100) * circ;
  return `<svg viewBox="0 0 120 120">
    <circle class="gauge-bg" cx="60" cy="60" r="${r}"/>
    <circle class="gauge-fill" cx="60" cy="60" r="${r}"
      stroke="${color}"
      stroke-dasharray="${circ}"
      stroke-dashoffset="${offset}"/>
  </svg>`;
}

// ── Render GPU card ──────────────────────────────────────────────────────────

function renderGPU(gpu) {
  const util = gpu['utilization.gpu [%]'] ?? null;
  const memUtil = gpu['utilization.memory [%]'] ?? null;
  const memUsed = gpu['memory.used [MiB]'];
  const memTotal = gpu['memory.total [MiB]'];
  const temp = gpu['temperature.gpu'];
  const power = gpu['power.draw [W]'];
  const pwrLimit = gpu['power.limit [W]'];
  const clockG = gpu['clocks.current.graphics [MHz]'];
  const clockM = gpu['clocks.current.memory [MHz]'];
  const name = gpu['name'] ?? 'Unknown';
  const idx = gpu['index'] ?? '?';
  const uuid = gpu['uuid'] ?? '';
  const host = gpu['host'] ?? 'local';

  const utilColor = gaugeColor(util);
  const tempCol = tempColor(temp);

  const memPct = (memUsed != null && memTotal != null) ? (memUsed / memTotal * 100) : null;
  const pwrPct = (power != null && pwrLimit != null) ? (power / pwrLimit * 100) : null;

  return `
  <div class="gpu-card">
    <div class="gpu-header">
      <div class="gpu-name">${name}</div>
      <div class="gpu-index">GPU ${idx}</div>
    </div>
    <div class="gpu-body">
      <div class="gauge">
        ${svgGauge(util ?? 0, utilColor)}
        <div class="gauge-center">
          <div class="gauge-value" style="color:${utilColor}">${util != null ? util : '--'}</div>
          <div class="gauge-label">Util %</div>
        </div>
      </div>
      <div class="gpu-metrics">
        <div class="metric-row">
          <span class="metric-label">Memory</span>
          <div class="metric-bar-container">
            <div class="metric-bar" style="width:${memPct ?? 0}%; background:${gaugeColor(memPct)}"></div>
          </div>
          <span class="metric-value">${memUsed != null && memTotal != null ? fmtNum(memUsed) + ' / ' + fmtNum(memTotal) + ' MiB' : 'N/A'}</span>
        </div>
        <div class="metric-row">
          <span class="metric-label">Temp</span>
          <div class="metric-bar-container">
            <div class="metric-bar" style="width:${temp != null ? temp : 0}%; background:${tempCol}"></div>
          </div>
          <span class="metric-value" style="color:${tempCol}">${temp != null ? temp + '°C' : 'N/A'}</span>
        </div>
        <div class="metric-row">
          <span class="metric-label">Power</span>
          <div class="metric-bar-container">
            <div class="metric-bar" style="width:${pwrPct ?? 0}%; background:var(--orange)"></div>
          </div>
          <span class="metric-value">${power != null ? power.toFixed(1) + 'W' : 'N/A'}${pwrLimit != null ? ' / ' + pwrLimit + 'W' : ''}</span>
        </div>
        <div class="metric-row">
          <span class="metric-label">Clocks</span>
          <span class="metric-value">${clockG != null ? clockG + ' MHz' : 'N/A'}${clockM != null ? ' / ' + clockM + ' MHz' : ''}</span>
        </div>
        <div class="metric-row">
          <span class="metric-label">Driver</span>
          <span class="metric-value">${gpu['driver_version'] ?? 'N/A'}</span>
        </div>
      </div>
    </div>
  </div>`;
}

// ── Render server card ───────────────────────────────────────────────────────

function renderServer(s) {
  const st = s.stats;
  const online = s.online;
  const models = (s.models || []).join(', ');

  let running = 0, queued = 0, throughput = 0;
  let kvCache = 0, weightGb = 0, kvCacheGb = 0;
  let specAcceptLen = 0, specAcceptRate = 0, version = '';
  let tokenUsage = 0, totalTokens = 0;
  let inputThroughput = 0;

  if (s.type === 'sglang') {
    running = st.running_requests ?? st.num_running_reqs;
    queued = st.queued_requests ?? st.num_waiting_reqs;
    throughput = st.gen_throughput ?? st.throughput;
    inputThroughput = st.input_throughput ?? 0;
    kvCache = st.token_usage ?? st.kv_cache_hit_rate ?? 0;
    weightGb = st.weight_gb ?? 0;
    kvCacheGb = st.kv_cache_gb ?? 0;
    specAcceptLen = st.spec_accept_length ?? 0;
    specAcceptRate = st.spec_accept_rate ?? 0;
    version = st.version ?? '';
    tokenUsage = st.token_usage ?? 0;
    totalTokens = st.total_tokens ?? 0;
  }

  const sparkKey = `srv-${s.name}-throughput`;
  pushSpark(sparkKey, throughput);
  const tputColor = 'var(--green)';
  // Show 0 for numeric display when idle
  const displayThroughput = (s.type === 'sglang' && (s.stats.running_requests ?? 0) === 0) ? 0 : throughput;

  const inputSparkKey = `srv-${s.name}-input`;
  pushSpark(inputSparkKey, inputThroughput);
  const inputColor = 'var(--cyan)';
  const displayInputThroughput = (s.type === 'sglang' && (s.stats.running_requests ?? 0) === 0) ? 0 : inputThroughput;

  return `
  <div class="server-card ${online ? '' : 'offline'}">
    <div class="server-header">
      <div class="server-type">${s.type}</div>
    </div>
    ${online ? `
    <div class="server-model">Model: ${models || 'Unknown'}</div>
    <div class="server-stats">
      <div class="server-stat">
        <div class="server-stat-value" style="color:${tputColor}">${displayThroughput != null ? displayThroughput.toFixed(2) : '--'}</div>
        <div class="server-stat-label">Gen tok/s</div>
        ${renderSpark(sparkKey, tputColor)}
      </div>
      <div class="server-stat">
        <div class="server-stat-value" style="color:${inputColor}">${displayInputThroughput != null ? displayInputThroughput.toFixed(1) : '--'}</div>
        <div class="server-stat-label">Input tok/s</div>
        ${renderSpark(inputSparkKey, inputColor)}
      </div>
      <div class="server-stat">
        <div class="server-stat-value">${running ?? '--'}</div>
        <div class="server-stat-label">Running</div>
      </div>
      <div class="server-stat">
        <div class="server-stat-value">${queued ?? '--'}</div>
        <div class="server-stat-label">Queued</div>
      </div>
      <div class="server-stat">
        <div class="server-stat-value">${(kvCache * 100).toFixed(1)}%</div>
        <div class="server-stat-label">KV Cache</div>
      </div>
      <div class="server-stat">
        <div class="server-stat-value">${weightGb ? weightGb.toFixed(1) + ' GB' : '--'}</div>
        <div class="server-stat-label">Weights</div>
      </div>
      <div class="server-stat">
        <div class="server-stat-value">${kvCacheGb ? kvCacheGb.toFixed(1) + ' GB' : '--'}</div>
        <div class="server-stat-label">KV Cache</div>
      </div>
      ${specAcceptLen > 0 ? `
      <div class="server-stat">
        <div class="server-stat-value">${specAcceptLen.toFixed(1)} tok</div>
        <div class="server-stat-label">Spec Accept</div>
      </div>` : ''}
      ${specAcceptRate > 0 ? `
      <div class="server-stat">
        <div class="server-stat-value">${specAcceptRate.toFixed(1)}%</div>
        <div class="server-stat-label">Accept Rate</div>
      </div>` : ''}
      ${version ? `
      <div class="server-stat">
        <div class="server-stat-value">${version}</div>
        <div class="server-stat-label">Version</div>
      </div>` : ''}
    </div>
    ` : `
    <div class="server-error">Offline: ${s.error || 'Unknown error'}</div>
    `}
  </div>`;
}

// ── Sparkline history ──
const sparkData = {};
function pushSpark(key, value, max = 30) {
  if (!sparkData[key]) sparkData[key] = [];
  sparkData[key].push(value);
  if (sparkData[key].length > max) sparkData[key].shift();
}

function renderSpark(key, color) {
  const data = sparkData[key] || [];
  if (data.length < 2) return '';
  const max = Math.max(...data, 1);
  return '<div class="sparkline">' +
    data.map(v => `<div class="sparkline-bar" style="height:${(v/max*100).toFixed(0)}%;background:${color}"></div>`).join('') +
    '</div>';
}

// ── Fetch and update ─────────────────────────────────────────────────────────

async function fetchStats() {
  try {
    const resp = await fetch('/api/stats');
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const data = await resp.json();
    updateDashboard(data);
    document.getElementById('status-dot').className = 'status-dot';
    document.getElementById('status-text').textContent = 'Live';
    flash();
  } catch (e) {
    document.getElementById('status-dot').className = 'status-dot error';
    document.getElementById('status-text').textContent = 'Error: ' + e.message;
  }
}

function updateDashboard(data) {
  // System
  const sys = data.system;
  document.getElementById('sys-hostname').textContent = sys.hostname || '--';
  document.getElementById('sys-uptime').textContent = sys.uptime || '--';

  if (sys.mem_total > 0) {
    const pct = (sys.mem_used / sys.mem_total * 100);
    document.getElementById('sys-mem').textContent =
      fmtBytes(sys.mem_used) + ' / ' + fmtBytes(sys.mem_total) + ' (' + pct.toFixed(0) + '%)';
    document.getElementById('sys-mem-bar').style.width = pct + '%';
    document.getElementById('sys-mem-bar').style.background = gaugeColor(pct);
  }

  // Timestamp
  const now = new Date();
  document.getElementById('last-update').textContent =
    now.toTimeString().split(' ')[0];

  // Group GPUs and servers by host
  const hosts = {};
  hosts['local'] = {
    name: sys.hostname || 'local',
    subtitle: 'This machine',
    gpus: [],
    servers: []
  };

  data.gpus.forEach(g => {
    const h = g.host || 'local';
    if (!hosts[h]) {
      hosts[h] = { name: h, subtitle: '', gpus: [], servers: [] };
    }
    hosts[h].gpus.push(g);
  });

  data.servers.forEach(s => {
    let h = 'local';
    if (s.name && s.name !== 'local') {
      h = s.name;
    }
    if (!hosts[h]) {
      hosts[h] = { name: h, subtitle: '', gpus: [], servers: [] };
    }
    hosts[h].servers.push(s);
  });

  // Render as horizontal sections: GPUs row, then servers row
  const container = document.getElementById('host-groups');
  let html = '';

  // GPU section
  const gpuHosts = Object.entries(hosts).filter(([, h]) => h.gpus.length > 0);
  if (gpuHosts.length > 0) {
    html += `<div class="section-row">`;
    gpuHosts.forEach(([key, host]) => {
      html += `<div class="section-col">`;
      html += `<div class="host-header">
        <div class="host-dot"></div>
        <span class="host-name">${host.name.toUpperCase()}</span>
        ${host.subtitle ? `<span class="host-subtitle">${host.subtitle}</span>` : ''}
      </div>`;
      html += `<div class="section-title" style="margin-bottom:8px;">GPUs</div>`;
      html += `<div class="gpu-grid">`;
      host.gpus.forEach((g, i) => { html += renderGPU(g); });
      html += `</div>`;
      html += `</div>`;
    });
    html += `</div>`;
  }

  // Server section
  const serverHosts = Object.entries(hosts).filter(([, h]) => h.servers.length > 0);
  if (serverHosts.length > 0) {
    html += `<div class="section-row">`;
    serverHosts.forEach(([key, host]) => {
      html += `<div class="section-col">`;
      html += `<div class="section-title" style="margin-bottom:8px;margin-top:12px;">Inference Servers</div>`;
      html += `<div class="server-grid">`;
      host.servers.forEach(s => { html += renderServer(s); });
      html += `</div>`;
      html += `</div>`;
    });
    html += `</div>`;
  }

  container.innerHTML = html;
}

function flash() {
  const el = document.getElementById('flash');
  el.classList.remove('active');
  void el.offsetWidth; // reflow
  el.classList.add('active');
}

// ── Tab switching ────────────────────────────────────────────────────────────

let benchmarksData = null;
let pollTimer = setInterval(fetchStats, {{ refresh_interval }} * 1000);

document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const tabId = btn.dataset.tab;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    document.getElementById('tab-' + tabId).classList.add('active');
    if (tabId === 'live') {
      if (!pollTimer) pollTimer = setInterval(fetchStats, {{ refresh_interval }} * 1000);
    } else {
      clearInterval(pollTimer);
      pollTimer = null;
      if (!benchmarksData) fetchBenchmarks();
    }
  });
});

// ── Sub-tab switching ────────────────────────────────────────────────────────

document.querySelectorAll('.sub-tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const subId = btn.dataset.subtab;
    document.querySelectorAll('.sub-tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.querySelectorAll('.sub-tab-panel').forEach(p => p.classList.remove('active'));
    document.getElementById('subtab-' + subId).classList.add('active');
  });
});

// ── Benchmark data fetch ─────────────────────────────────────────────────────

async function fetchBenchmarks() {
  try {
    const resp = await fetch('/api/benchmarks');
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    benchmarksData = await resp.json();
    renderAllBenchmarks(benchmarksData);
  } catch (e) {
    document.querySelectorAll('.sub-tab-panel').forEach(p => {
      p.innerHTML = `<div class="bm-empty">Error loading benchmarks: ${he(e.message)}</div>`;
    });
  }
}

function renderAllBenchmarks(data) {
  document.getElementById('subtab-oneshot').innerHTML = renderOneshotTable(data.oneshot_table);
  document.getElementById('subtab-multiturn').innerHTML = renderMultiturnLangTable(data.multiturn_lang_table);
  document.getElementById('subtab-heatmap').innerHTML = renderHeatmap(data.oneshot_table);
  document.getElementById('subtab-quantization').innerHTML = renderQuantization(data.quant_comparison_table, data.comparison_table);
  document.getElementById('subtab-tokencost').innerHTML = renderTokenCost(data.token_cost_table, data.multiturn_leaderboard);
}

// ── Oneshot table ────────────────────────────────────────────────────────────

function renderOneshotTable(tbl) {
  if (!tbl || tbl.length === 0) return '<div class="bm-empty">No oneshot data</div>';
  const langs = ['python', 'javascript', 'go', 'rust', 'cpp', 'java'];
  const sorted = [...tbl].sort((a, b) => b.overall - a.overall);
  let html = '<div style="overflow-x:auto"><table class="data-table"><thead><tr>';
  html += '<th>Model</th><th>Params</th><th>Quant</th><th>Overall</th>';
  langs.forEach(l => { html += `<th>${l}</th>`; });
  html += '</tr></thead><tbody>';
  sorted.forEach(entry => {
    const overallColor = entry.overall >= 80 ? 'var(--green)' : entry.overall >= 50 ? 'var(--yellow)' : 'var(--red)';
    html += `<tr><td><strong>${he(entry.model)}</strong></td>`;
    html += `<td class="num">${he(entry.params)}</td>`;
    html += `<td>${he(entry.quant)}</td>`;
    html += `<td class="num"><div style="color:${overallColor};font-weight:600">${entry.overall}%</div><div class="table-bar-wrap"><div class="table-bar" style="width:${entry.overall}%;background:${overallColor}"></div></div></td>`;
    langs.forEach(l => {
      const d = entry.per_lang[l];
      if (d != null) {
        const pct = d.pct;
        const color = pct >= 80 ? 'var(--green)' : pct >= 50 ? 'var(--yellow)' : 'var(--red)';
        html += `<td class="num"><div style="color:${color};font-weight:600">${pct}%</div><div class="table-bar-wrap"><div class="table-bar" style="width:${pct}%;background:${color}"></div></div><div style="font-size:10px;color:var(--text-dim);margin-top:2px">${d.ok}/${d.total}</div></td>`;
      } else {
        html += '<td class="num" style="color:var(--text-dim)">--</td>';
      }
    });
    html += '</tr>';
  });
  html += '</tbody></table></div>';
  return html;
}

// ── Multi-turn per-lang table ────────────────────────────────────────────────

function renderMultiturnLangTable(langTable) {
  if (!langTable || langTable.length === 0) return '<div class="bm-empty">No multi-turn data</div>';
  const langs = ['python', 'javascript', 'go', 'rust', 'cpp', 'java'];
  let html = '<div style="overflow-x:auto"><table class="data-table"><thead><tr>';
  html += '<th>Model</th><th>Params</th><th>Quant</th><th>pass@1</th><th>pass@2</th>';
  langs.forEach(l => { html += `<th>${l}</th>`; });
  html += '</tr></thead><tbody>';
  const sorted = [...langTable].sort((a, b) => parseFloat(b.pass2) - parseFloat(a.pass2));
  sorted.forEach(entry => {
    const p2color = parseFloat(entry.pass2) >= 80 ? 'var(--green)' : parseFloat(entry.pass2) >= 50 ? 'var(--yellow)' : 'var(--red)';
    html += `<tr><td><strong>${he(entry.model)}</strong></td>`;
    html += `<td class="num">${he(entry.params)}</td>`;
    html += `<td>${he(entry.quant)}</td>`;
    html += `<td class="num">${entry.pass1}</td>`;
    html += `<td class="num" style="color:${p2color};font-weight:600">${entry.pass2}</td>`;
    langs.forEach(l => {
      const v = entry.per_lang[l];
      if (v != null) {
        const color = v >= 80 ? 'var(--green)' : v >= 50 ? 'var(--yellow)' : 'var(--red)';
        html += `<td class="num"><div style="color:${color};font-weight:600">${v}</div></td>`;
      } else {
        html += '<td class="num" style="color:var(--text-dim)">--</td>';
      }
    });
    html += '</tr>';
  });
  html += '</tbody></table></div>';
  return html;
}

// ── Language heatmap (uses oneshot_table) ────────────────────────────────────

function renderHeatmap(tbl) {
  if (!tbl || tbl.length === 0) return '<div class="bm-empty">No oneshot data</div>';
  const langs = ['python', 'javascript', 'go', 'rust', 'cpp', 'java'];
  let html = '<div style="overflow-x:auto"><table class="data-table"><thead><tr>';
  html += '<th>Model</th>';
  langs.forEach(l => { html += `<th>${l}</th>`; });
  html += '<th>Overall</th></tr></thead><tbody>';
  const sorted = [...tbl].sort((a, b) => b.overall - a.overall);
  sorted.forEach(entry => {
    const overallColor = entry.overall >= 80 ? '0,230,118' : entry.overall >= 50 ? '255,202,40' : '255,82,82';
    const overallAlpha = (entry.overall / 100 * 0.35).toFixed(2);
    html += `<tr><td><strong>${he(entry.model)}</strong></td>`;
    langs.forEach(l => {
      const d = entry.per_lang[l];
      if (d != null) {
        const pct = d.pct;
        const bgAlpha = (pct / 100 * 0.35).toFixed(2);
        const color = pct >= 80 ? '0,230,118' : pct >= 50 ? '255,202,40' : '255,82,82';
        html += `<td><div class="hm-cell" style="background:rgba(${color},${bgAlpha});color:rgba(${color},0.9)">${pct}%</div></td>`;
      } else {
        html += '<td style="text-align:center;color:var(--text-dim)">--</td>';
      }
    });
    html += `<td><div class="hm-cell" style="background:rgba(${overallColor},${overallAlpha});color:rgba(${overallColor},0.9)">${entry.overall}%</div></td>`;
    html += '</tr>';
  });
  html += '</tbody></table></div>';
  return html;
}

// ── Quantization comparison ──────────────────────────────────────────────────

function renderQuantization(quantTable, comparisonTable) {
  let html = '';

  if (quantTable && quantTable.length > 0) {
    html += '<div class="section-title" style="margin-bottom:8px;">Quantization Impact (pass@2)</div>';
    html += '<div style="overflow-x:auto;margin-bottom:20px"><table class="data-table"><thead><tr>';
    html += '<th>Model</th><th>Params</th><th>BF16</th><th>FP8</th><th>NVFP4</th><th>Delta</tr></thead><tbody>';
    quantTable.forEach(entry => {
      const parsePct = (v) => parseFloat(v) || 0;
      const bf16Val = parsePct(entry.bf16);
      const fp8Val = parsePct(entry.fp8);
      const nvfp4Val = parsePct(entry.nvfp4);
      const bf16Color = bf16Val >= 80 ? 'var(--green)' : bf16Val >= 50 ? 'var(--yellow)' : 'var(--red)';
      const fp8Color = fp8Val >= 80 ? 'var(--green)' : fp8Val >= 50 ? 'var(--yellow)' : 'var(--red)';
      const nvfp4Color = nvfp4Val >= 80 ? 'var(--green)' : nvfp4Val >= 50 ? 'var(--yellow)' : 'var(--red)';
      html += `<tr><td><strong>${he(entry.model)}</strong></td><td class="num">${he(entry.params)}</td>`;
      html += `<td class="num"><div style="color:${bf16Color};font-weight:600">${entry.bf16}</div></td>`;
      html += `<td class="num"><div style="color:${fp8Color};font-weight:600">${entry.fp8}</div></td>`;
      html += `<td class="num"><div style="color:${nvfp4Color};font-weight:600">${entry.nvfp4}</div></td>`;
      html += `<td class="num" style="color:var(--orange)">${he(entry.delta)}</td></tr>`;
    });
    html += '</tbody></table></div>';
  }

  if (comparisonTable && comparisonTable.length > 0) {
    html += '<div class="section-title" style="margin-bottom:8px;">DFlash vs Standard Comparison</div>';
    html += '<div style="overflow-x:auto"><table class="data-table"><thead><tr>';
    html += '<th>Model</th><th>Params</th><th>Config</th><th>Oneshot</th><th>Multi-turn</th></tr></thead><tbody>';
    comparisonTable.forEach(entry => {
      const osColor = entry.oneshot !== 'N/A' ? (parseFloat(entry.oneshot) >= 50 ? 'var(--green)' : 'var(--yellow)') : 'var(--text-dim)';
      const mtColor = entry.multiturn !== 'N/A' ? (parseFloat(entry.multiturn) >= 50 ? 'var(--green)' : 'var(--yellow)') : 'var(--text-dim)';
      html += `<tr><td><strong>${he(entry.model)}</strong></td><td class="num">${he(entry.params)}</td><td>${he(entry.config)}</td>`;
      html += `<td class="num" style="color:${osColor};font-weight:600">${entry.oneshot}</td>`;
      html += `<td class="num" style="color:${mtColor};font-weight:600">${entry.multiturn}</td></tr>`;
    });
    html += '</tbody></table></div>';
  }

  if (!html) return '<div class="bm-empty">No quantization data</div>';
  return html;
}

// ── Token cost ───────────────────────────────────────────────────────────────

function renderTokenCost(tbl, leaderboard) {
  let html = '';

  if (tbl && tbl.length > 0) {
    html += '<div class="section-title" style="margin-bottom:8px;">Oneshot Token Cost</div>';
    const langs = ['python', 'javascript', 'go', 'rust', 'cpp', 'java'];
    const sorted = [...tbl].sort((a, b) => b.avg - a.avg);
    const maxAvg = Math.max(...sorted.map(e => e.avg), 1);
    html += '<div style="overflow-x:auto;margin-bottom:24px"><table class="data-table"><thead><tr>';
    html += '<th>Model</th><th>Quant</th><th>Tests</th><th>Total Tokens</th><th>Avg/Test</th>';
    langs.forEach(l => { html += `<th>${l}</th>`; });
    html += '</tr></thead><tbody>';
    sorted.forEach(entry => {
      const pct = (entry.avg / maxAvg * 100).toFixed(1);
      html += `<tr><td><strong>${he(entry.model)}</strong></td>`;
      html += `<td>${he(entry.quant)}</td>`;
      html += `<td class="num">${entry.tests}</td>`;
      html += `<td class="num">${fmtNum(entry.total, 0)}</td>`;
      html += `<td class="num"><div style="font-weight:600">${fmtNum(entry.avg, 0)}</div><div class="table-bar-wrap"><div class="table-bar" style="width:${pct}%;background:var(--orange)"></div></div></td>`;
      langs.forEach(l => {
        const v = entry.per_lang[l];
        html += `<td class="num">${v != null ? fmtNum(v, 0) : '--'}</td>`;
      });
      html += '</tr>';
    });
    html += '</tbody></table></div>';
  }

  if (leaderboard && leaderboard.length > 0) {
    html += '<div class="section-title" style="margin-bottom:8px;">Multi-turn Token Cost</div>';
    html += '<div style="overflow-x:auto"><table class="data-table"><thead><tr>';
    html += '<th>Model</th><th>Quant</th><th>pass@1</th><th>pass@2</th><th>Total Tokens</th><th>Prompt</th><th>Completion</th><th>Avg/Test</th></tr></thead><tbody>';
    const sorted = [...leaderboard].sort((a, b) => parseFloat(b.pass2) - parseFloat(a.pass2));
    sorted.forEach(entry => {
      const p2color = parseFloat(entry.pass2) >= 80 ? 'var(--green)' : parseFloat(entry.pass2) >= 50 ? 'var(--yellow)' : 'var(--red)';
      html += `<tr><td><strong>${he(entry.model)}</strong></td><td>${he(entry.quant)}</td>`;
      html += `<td class="num">${entry.pass1}</td>`;
      html += `<td class="num" style="color:${p2color};font-weight:600">${entry.pass2}</td>`;
      html += `<td class="num">${fmtNum(entry.total_tokens, 0)}</td>`;
      html += `<td class="num">${fmtNum(entry.prompt_tokens, 0)}</td>`;
      html += `<td class="num">${fmtNum(entry.completion_tokens, 0)}</td>`;
      html += `<td class="num">${fmtNum(entry.avg_per_test, 0)}</td></tr>`;
    });
    html += '</tbody></table></div>';
  }

  if (!html) return '<div class="bm-empty">No token cost data</div>';
  return html;
}
